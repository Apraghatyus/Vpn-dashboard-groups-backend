# ═══════════════════════════════════════════════
# WG-ACL Manager — Backend (Flask)
# Proyecto independiente — se conecta al frontend
# por red Docker compartida (wg-acl-network)
# ═══════════════════════════════════════════════

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wg-acl-backend
    env_file: .env
    volumes:
      - wg-acl-data:/app/data
      - ./scripts:/app/scripts:ro
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-wg-acl-change-me-in-production}
      - DEFAULT_ADMIN_USER=${DEFAULT_ADMIN_USER:-admin}
      - DEFAULT_ADMIN_PASS=${DEFAULT_ADMIN_PASS:-admin}
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - wg-acl

networks:
  wg-acl:
    name: wg-acl-network
    external: true

volumes:
  wg-acl-data:
